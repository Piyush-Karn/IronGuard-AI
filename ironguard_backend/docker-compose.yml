version: '3.8'

networks:
  ironguard_internal:
    internal: true        # no internet egress — service-to-service only
  ironguard_external:
    internal: false       # internet access — IronGuard only

services:

  # ── IronGuard Gateway ─────────────────────────────────────────────────────
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      ironguard_internal:
        aliases:
          - backend
      ironguard_external:
        aliases:
          - backend
    depends_on:
      - mongodb
      - chromadb
    volumes:
      - .:/app

  # ── Databases — internal only ──────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    networks:
      ironguard_internal:
        aliases:
          - mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  chromadb:
    image: chromadb/chroma:0.5.1
    networks:
      ironguard_internal:
        aliases:
          - chromadb
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma

volumes:
  mongodb_data:
  chromadb_data:
